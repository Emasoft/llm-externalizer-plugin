name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24'

      - name: Install dependencies
        working-directory: mcp-server
        run: npm install --ignore-scripts

      - name: TypeScript build check
        working-directory: mcp-server
        run: npx tsc --noEmit

      - name: Validate plugin manifest
        run: python3 -c "import json, pathlib; json.loads(pathlib.Path('.claude-plugin/plugin.json').read_text(encoding='utf-8'))"

      - name: Version consistency check
        run: |
          PV=$(python3 -c "import json, pathlib; print(json.loads(pathlib.Path('.claude-plugin/plugin.json').read_text(encoding='utf-8'))['version'])")
          PKG=$(python3 -c "import json, pathlib; print(json.loads(pathlib.Path('mcp-server/package.json').read_text(encoding='utf-8'))['version'])")
          SRV=$(python3 -c "import json, pathlib; print(json.loads(pathlib.Path('mcp-server/server.json').read_text(encoding='utf-8'))['version'])")
          echo "plugin.json: $PV | package.json: $PKG | server.json: $SRV"
          if [ "$PV" != "$PKG" ] || [ "$PV" != "$SRV" ]; then
            echo "::error::Version mismatch across manifests"
            exit 1
          fi
