[changelog]
header = "# Changelog\n\nAll notable changes to this project will be documented in this file.\n"
# Template uses `commit.raw_message` (unparsed full text from git) so both
# the subject AND the full multi-line body appear in the changelog,
# regardless of whether conventional-commit parsing extracted a scope.
# Previously the template used `{{ commit.message }}` which drops the
# body entirely when conventional_commits=true successfully parses a
# `scope: subject` line (the body becomes commit.body, first paragraph
# only). raw_message sidesteps that truncation.
body = """
{% if version %}\
    ## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
    ## [Unreleased]
{% endif %}\
{% for group, commits in commits | group_by(attribute="group") %}
    ### {{ group | striptags | trim | upper_first }}
    {% for commit in commits %}
        - {{ commit.raw_message | upper_first | trim }}
    {% endfor %}
{% endfor %}\n
"""
trim = true
footer = ""

[git]
conventional_commits = true
filter_unconventional = false
commit_parsers = [
    { message = "^feat", group = "Added" },
    { message = "^fix", group = "Fixed" },
    { message = "^doc|^docs", group = "Documentation" },
    { message = "^perf", group = "Performance" },
    { message = "^refactor", group = "Refactored" },
    { message = "^style", group = "Styling" },
    { message = "^test", group = "Testing" },
    { message = "^chore\\(release\\)", skip = true },
    { message = "^chore: auto-bump", skip = true },
    { message = "^chore", group = "Miscellaneous" },
    { message = "^Release v", group = "Releases", skip = true },
    { body = ".*", group = "Changed" },
]
filter_commits = false
tag_pattern = "v[0-9].*"
sort_commits = "newest"
